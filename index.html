<html lang="zh"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>我的社工鴿</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #fff7ed, #ffedd5);
  text-align: center;
}

/* START */
#startScreen {
  position: fixed;
  inset: 0;
  background: #fff7ed;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* TRANSITION */
#transition {
  position: fixed;
  inset: 0;
  background: #fb923c;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.5s;
  z-index: 1000;
}
#transition.active {
  opacity: 1;
  pointer-events: all;
}

/* APP */
.app {
  display: none;
  max-width: 520px;
  margin: auto;
  padding: 20px;
  position: relative;
}

/* 返回鍵 */
.top-back-btn {
  position: absolute;
  top: 16px;
  left: 16px;
  padding: 10px 14px;
  border-radius: 12px;
  border: 2px solid #fb923c;
  background: white;
  color: #fb923c;
  cursor: pointer;
}

/* AVATAR */
.avatar {
  position: relative;
  width: 280px;
  height: 280px;
  margin: 20px auto;
  background: white;
  border-radius: 24px;
  overflow: hidden;
}
.avatar img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* TAB */
.tab-bar {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
}
.tab-btn {
  padding: 8px 14px;
  border-radius: 12px;
  border: 2px solid #fed7aa;
  background: white;
  color: #fb923c;
  cursor: pointer;
}
.tab-btn.active {
  background: #fb923c;
  color: white;
}

/* TAB CONTENT */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* OPTIONS */
.options {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  padding: 10px;
}
.options img {
  width: 90px;
  height: 90px;
  border-radius: 14px;
  border: 2px solid #fff7ed;
  cursor: pointer;
}
.none {
  width: 90px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 14px;
  border: 2px dashed #ccc;
  cursor: pointer;
  color: #999;
}

/* BUTTON */
.big-btn {
  width: 85%;
  margin: 14px auto;
  padding: 18px;
  font-size: 20px;
  border-radius: 18px;
  background: #fb923c;
  color: white;
  border: none;
  cursor: pointer;
}
.small-btn {
  width: 65%;
  margin: 10px auto;
  padding: 10px;
  border-radius: 14px;
  background: white;
  border: 2px solid #fb923c;
  color: #fb923c;
  cursor: pointer;
}

/* RESULT */
#resultScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: #fff7ed;
  z-index: 2000;
  padding-top: 40px;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen" style="display: none;">
  <h1>開始捏鴿</h1>
  <button class="big-btn" onclick="startGame()">START</button>
</div>

<!-- TRANSITION -->
<div id="transition" class="">
  <div style="color:white;font-size:24px;">Loading...</div>
</div>

<!-- APP -->
<div class="app" id="mainApp" style="display: none;">

<button class="top-back-btn" onclick="goHome()">↩ 返回</button>

<h2>咕咕咕?</h2>

<div class="avatar">
  <img id="bodyLayer" src="file:///C:/Amber/%E6%8D%8F%E8%87%89%E7%B3%BB%E7%B5%B1%EF%BC%88%E6%9C%80%E7%B5%82%E7%A9%A9%E5%AE%9A%E5%AE%8C%E6%95%B4%E7%89%88%EF%BC%89.html">
  <img id="bgLayer" src="file:///C:/Amber/%E6%8D%8F%E8%87%89%E7%B3%BB%E7%B5%B1%EF%BC%88%E6%9C%80%E7%B5%82%E7%A9%A9%E5%AE%9A%E5%AE%8C%E6%95%B4%E7%89%88%EF%BC%89.html">
  <img id="faceLayer" src="./捏臉系統（最終穩定完整版）4_files/9Xn4K5L.png">
  <img id="eyesLayer" src="./捏臉系統（最終穩定完整版）4_files/Xd9KQ7E.png">
  <img id="mouthLayer" src="file:///C:/Amber/%E6%8D%8F%E8%87%89%E7%B3%BB%E7%B5%B1%EF%BC%88%E6%9C%80%E7%B5%82%E7%A9%A9%E5%AE%9A%E5%AE%8C%E6%95%B4%E7%89%88%EF%BC%89.html">
  <img id="hairLayer" src="file:///C:/Amber/%E6%8D%8F%E8%87%89%E7%B3%BB%E7%B5%B1%EF%BC%88%E6%9C%80%E7%B5%82%E7%A9%A9%E5%AE%9A%E5%AE%8C%E6%95%B4%E7%89%88%EF%BC%89.html">
  <img id="accessoryLayer" src="file:///C:/Amber/%E6%8D%8F%E8%87%89%E7%B3%BB%E7%B5%B1%EF%BC%88%E6%9C%80%E7%B5%82%E7%A9%A9%E5%AE%9A%E5%AE%8C%E6%95%B4%E7%89%88%EF%BC%89.html">
  <img id="floatLayer" src="file:///C:/Amber/%E6%8D%8F%E8%87%89%E7%B3%BB%E7%B5%B1%EF%BC%88%E6%9C%80%E7%B5%82%E7%A9%A9%E5%AE%9A%E5%AE%8C%E6%95%B4%E7%89%88%EF%BC%89.html">
</div>

<div class="tab-bar">
  <button class="tab-btn" onclick="openTab(&#39;body&#39;,event)">身體</button>
  <button class="tab-btn" onclick="openTab(&#39;hair&#39;,event)">髮型</button>
  <button class="tab-btn" onclick="openTab(&#39;eyes&#39;,event)">眼睛</button>
  <button class="tab-btn" onclick="openTab(&#39;face&#39;,event)">臉部</button>
  <button class="tab-btn" onclick="openTab(&#39;mouth&#39;,event)">嘴巴</button>
  <button class="tab-btn" onclick="openTab(&#39;accessory&#39;,event)">配件</button>
  <button class="tab-btn active" onclick="openTab(&#39;float&#39;,event)">泳圈</button>
  <button class="tab-btn" onclick="openTab(&#39;bg&#39;,event)">背景</button>
</div>

<!-- 每個分類（完全保留） -->
<div id="body" class="tab-content">
<div class="options">
<div class="none" onclick="clearLayer(&#39;bodyLayer&#39;)">None</div>
<img src="./捏臉系統（最終穩定完整版）4_files/1XqXK0G.png" onclick="setLayer(&#39;bodyLayer&#39;,this.src)">
<img src="./捏臉系統（最終穩定完整版）4_files/9Xn4K5L(1).png" onclick="setLayer(&#39;bodyLayer&#39;,this.src)">
</div>
</div>

<div id="hair" class="tab-content">
<div class="options">
<div class="none" onclick="clearLayer(&#39;hairLayer&#39;)">None</div>
<img src="./捏臉系統（最終穩定完整版）4_files/8Qf6G5X.png" onclick="setLayer(&#39;hairLayer&#39;,this.src)">
<img src="./捏臉系統（最終穩定完整版）4_files/Z6X6QpG.png" onclick="setLayer(&#39;hairLayer&#39;,this.src)">
</div>
</div>

<div id="eyes" class="tab-content">
<div class="options">
<div class="none" onclick="clearLayer(&#39;eyesLayer&#39;)">None</div>
<img src="./捏臉系統（最終穩定完整版）4_files/0Z8FQ0b.png" onclick="setLayer(&#39;eyesLayer&#39;,this.src)">
<img src="./捏臉系統（最終穩定完整版）4_files/Xd9KQ7E(1).png" onclick="setLayer(&#39;eyesLayer&#39;,this.src)">
</div>
</div>

<div id="face" class="tab-content">
<div class="options">
<div class="none" onclick="clearLayer(&#39;faceLayer&#39;)">None</div>
<img src="./捏臉系統（最終穩定完整版）4_files/1XqXK0G.png">
<img src="./捏臉系統（最終穩定完整版）4_files/9Xn4K5L(1).png">
</div>
</div>

<div id="mouth" class="tab-content">
<div class="options">
<div class="none" onclick="clearLayer(&#39;mouthLayer&#39;)">None</div>
<img src="./捏臉系統（最終穩定完整版）4_files/3cX1F1R.png" onclick="setLayer(&#39;mouthLayer&#39;,this.src)">
</div>
</div>

<div id="accessory" class="tab-content">
<div class="options">
<div class="none" onclick="clearLayer(&#39;accessoryLayer&#39;)">None</div>

</div>
</div>

<div id="float" class="tab-content active">
<div class="options">
<div class="none" onclick="clearLayer(&#39;floatLayer&#39;)">None</div>
<img src="./捏臉系統（最終穩定完整版）4_files/7kZQ1aB.png" onclick="setLayer(&#39;floatLayer&#39;,this.src)">
</div>
</div>

<div id="bg" class="tab-content">
<div class="options">
<div class="none" onclick="clearLayer(&#39;bgLayer&#39;)">None</div>
<img src="./捏臉系統（最終穩定完整版）4_files/q3ZQZ6D.png" onclick="setLayer(&#39;bgLayer&#39;,this.src)">
<img src="./捏臉系統（最終穩定完整版）4_files/7sKQZ2p.png" onclick="setLayer(&#39;bgLayer&#39;,this.src)">

<button class="small-btn" onclick="randomAvatar()">🎲 隨機</button>
<button class="big-btn" onclick="downloadAvatar()">生成</button>

</div>

<!-- RESULT -->
<div id="resultScreen" style="display: block;">
<h1>咕咕成功</h1>
<canvas id="resultCanvas" width="280" height="280"></canvas>

<button class="big-btn" onclick="downloadFinal()">⬇ 下載</button>
<button class="small-btn" onclick="back()">↩ 返回</button>
</div>

<script>

function startGame(){  
  document.getElementById("transition").classList.add("active");  
  setTimeout(()=>{    
    document.getElementById("startScreen").style.display="none";    
    document.getElementById("mainApp").style.display="block";    
    document.getElementById("transition").classList.remove("active");  
  },800);
}

function openTab(tab,event){  
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));  
  document.getElementById(tab).classList.add("active");  
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));  
  if(event) event.target.classList.add("active");
}

function goHome(){  
  document.getElementById("mainApp").style.display="none";  
  document.getElementById("resultScreen").style.display="none";  
  document.getElementById("startScreen").style.display="flex";
}

function back(){  
  document.getElementById("resultScreen").style.display="none";  
  document.getElementById("mainApp").style.display="block";
}

// 修改：確保設定 src 時處理跨域問題
function setLayer(id, src){ 
  const el = document.getElementById(id);
  el.crossOrigin = "anonymous"; 
  el.src = src; 
}

function clearLayer(id){ document.getElementById(id).src=""; }

function randomAvatar(){
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  const pool = {    
    bodyLayer:["https://i.imgur.com/1XqXK0G.png","https://i.imgur.com/9Xn4K5L.png",""],    
    hairLayer:["https://i.imgur.com/8Qf6G5X.png","https://i.imgur.com/Z6X6QpG.png",""],    
    eyesLayer:["https://i.imgur.com/0Z8FQ0b.png","https://i.imgur.com/Xd9KQ7E.png"],    
    faceLayer:["https://i.imgur.com/1XqXK0G.png","https://i.imgur.com/9Xn4K5L.png"],    
    mouthLayer:["https://i.imgur.com/3cX1F1R.png",""],    
    accessoryLayer:["https://i.imgur.com/2Z0QxKJ.png",""],    
    floatLayer:["https://i.imgur.com/7kZQ1aB.png",""],    
    bgLayer:["https://i.imgur.com/q3ZQZ6D.png","https://i.imgur.com/7sKQZ2p.png",""]  
  };

  Object.keys(pool).forEach(id=>{    
    const el = document.getElementById(id);
    if(el) {
      el.crossOrigin = "anonymous";
      el.src = pick(pool[id]);
    }
  });
}

// 修正：將所有圖片層繪製到 Canvas 上
function downloadAvatar(){  
  const canvas = document.getElementById("resultCanvas");
  const ctx = canvas.getContext("2d");
  
  // 清空畫布
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // 依照正確的疊放順序繪製 (背景最下)
  const layerIds = ["bgLayer", "bodyLayer", "faceLayer", "eyesLayer", "mouthLayer", "hairLayer", "accessoryLayer", "floatLayer"];
  
  layerIds.forEach(id => {
    const img = document.getElementById(id);
    // 只有當圖片有來源且已載入時才繪製
    if(img && img.src && img.complete && img.naturalWidth !== 0) {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }
  });

  document.getElementById("mainApp").style.display="none";  
  document.getElementById("resultScreen").style.display="block";
}

// 修正：實作下載功能
function downloadFinal(){
  const canvas = document.getElementById("resultCanvas");
  // 轉為 PNG DataURL
  const image = canvas.toDataURL("image/png");
  
  // 創建虛擬下載連結
  const link = document.createElement("a");
  link.href = image;
  link.download = "my_avatar_" + Date.now() + ".png";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}</script>


</body></html>
