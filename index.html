<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>我的社工鴿</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Noto Sans TC', sans-serif; /* 優先使用思源黑體 */
  background: linear-gradient(135deg, #fff7ed, #ffedd5);
  text-align: center;
}

/* START SCREEN */
#startScreen {
  position: fixed;
  inset: 0;
  background: #fff7ed;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
}
  /* 定義浮現動畫 */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px); /* 從下方 20px 的位置開始 */
  }
  to {
    opacity: 1;
    transform: translateY(0);    /* 回到原位 */
  }
}

.subtitle {
  margin-top: 15px;
  font-size: 18px;
  color: #c2410c;
  font-weight: 500;
  
  /* 應用動畫 */
  animation: fadeInUp 1.2s ease-out forwards; 
  /* 1.2s 是持續時間，forwards 讓動畫結束後停留在顯示狀態 */
  
  /* 延遲播放（選用）：讓它比標題晚一點點出現更有層次感 */
  animation-delay: 0.5s; 
  opacity: 0; /* 配合延遲，初始先隱藏 */
}

/* TRANSITION */
#transition {
  position: fixed;
  inset: 0;
  background: #fb923c;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.5s;
  z-index: 1000;
}
#transition.active {
  opacity: 1;
  pointer-events: all;
}

/* APP */
.app {
  display: none;
  max-width: 520px;
  margin: auto;
  padding: 20px;
  position: relative;
}

.top-back-btn {
  position: absolute;
  top: 16px;
  left: 16px;
  padding: 10px 14px;
  border-radius: 12px;
  border: 2px solid #fb923c;
  background: white;
  color: #fb923c;
  cursor: pointer;
}

/* AVATAR DISPLAY */
.avatar {
  position: relative;
  width: 280px;
  height: 280px;
  margin: 20px auto;
  background: white;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}
.avatar img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* TAB BAR */
.tab-bar {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-bottom: 15px;
}
.tab-btn {
  padding: 8px 14px;
  border-radius: 12px;
  border: 2px solid #fed7aa;
  background: white;
  color: #fb923c;
  cursor: pointer;
}
.tab-btn.active {
  background: #fb923c;
  color: white;
}

/* TAB CONTENT */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* OPTIONS */
.options {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  padding: 10px;
}
.options img {
  width: 90px;
  height: 90px;
  border-radius: 14px;
  border: 2px solid #fff7ed;
  cursor: pointer;
  transition: transform 0.2s;
}
.options img:hover { transform: scale(1.05); }

.none {
  width: 90px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 14px;
  border: 2px dashed #ccc;
  cursor: pointer;
  color: #999;
}

/* BUTTONS */
.big-btn {
  width: 85%;
  margin: 14px auto;
  padding: 18px;
  font-size: 20px;
  border-radius: 18px;
  background: #fb923c;
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
}
.small-btn {
  width: 65%;
  margin: 10px auto;
  padding: 10px;
  border-radius: 14px;
  background: white;
  border: 2px solid #fb923c;
  color: #fb923c;
  cursor: pointer;
}

/* RESULT */
#resultScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: #fff7ed;
  z-index: 2000;
  padding-top: 40px;
}
#resultCanvas {
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div id="startScreen" style="display: flex;">
  <h1>開始捏鴿</h1>
  <button class="big-btn" onclick="startGame()">START</button>
  
  <p class="subtitle">製作專屬於你的社工小夥伴</p>
</div>

<div id="transition">
  <div style="color:white;font-size:24px;">Loading...</div>
</div>

<div class="app" id="mainApp" style="display: none;">
  <button class="top-back-btn" onclick="goHome()">↩ 返回</button>
  <h2>咕咕咕?</h2>

  <div class="avatar">
    <img id="bgLayer" src="assets/background/bg01.PNG">
    <img id="bodyLayer" src="assets/1XqXK0G.png">
    <img id="faceLayer" src="">
    <img id="eyesLayer" src="">
    <img id="mouthLayer" src="">
    <img id="hairLayer" src="">
    <img id="accessoryLayer" src="">
    <img id="floatLayer" src="">
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="openTab('body',event)">身體</button>
    <button class="tab-btn" onclick="openTab('hair',event)">髮型</button>
    <button class="tab-btn" onclick="openTab('eyes',event)">眼睛</button>
    <button class="tab-btn" onclick="openTab('face',event)">臉部</button>
    <button class="tab-btn" onclick="openTab('mouth',event)">嘴巴</button>
    <button class="tab-btn" onclick="openTab('accessory',event)">配件</button>
    <button class="tab-btn" onclick="openTab('float',event)">泳圈</button>
    <button class="tab-btn" onclick="openTab('bg',event)">背景</button>
  </div>

  <div id="body" class="tab-content active">
    <div class="options">
      <div class="none" onclick="clearLayer('bodyLayer')">None</div>
      <img src="assets/1XqXK0G.png" onclick="setLayer('bodyLayer',this.src)">
    </div>
  </div>

  <div id="hair" class="tab-content">
    <div class="options">
      <div class="none" onclick="clearLayer('hairLayer')">None</div>
      <img src="assets/1XqXK0G.png" onclick="setLayer('hairLayer',this.src)">
    </div>
  </div>

  <div id="eyes" class="tab-content">
    <div class="options">
      <div class="none" onclick="clearLayer('eyesLayer')">None</div>
      <img src="assets/1XqXK0G.png" onclick="setLayer('eyesLayer',this.src)">
    </div>
  </div>

  <div id="face" class="tab-content">
    <div class="options">
      <div class="none" onclick="clearLayer('faceLayer')">None</div>
      <img src="assets/1XqXK0G.png" onclick="setLayer('faceLayer',this.src)">
    </div>
  </div>

  <div id="mouth" class="tab-content">
    <div class="options">
      <div class="none" onclick="clearLayer('mouthLayer')">None</div>
      <img src="assets/1XqXK0G.png" onclick="setLayer('mouthLayer',this.src)">
    </div>
  </div>

  <div id="accessory" class="tab-content">
    <div class="options">
      <div class="none" onclick="clearLayer('accessoryLayer')">None</div>
      <img src="assets/1XqXK0G.png" onclick="setLayer('accessoryLayer',this.src)">
    </div>
  </div>

  <div id="float" class="tab-content">
    <div class="options">
      <div class="none" onclick="clearLayer('floatLayer')">None</div>
      <img src="assets/1XqXK0G.png" onclick="setLayer('floatLayer',this.src)">
    </div>
  </div>

  <div id="bg" class="tab-content">
    <div class="options">
      <div class="none" onclick="clearLayer('bgLayer')">None</div>
      <img src="assets/background/bg01.PNG" onclick="setLayer('bgLayer',this.src)">
      <img src="assets/background/bg02.PNG" onclick="setLayer('bgLayer',this.src)">
      <img src="assets/background/bg03.PNG" onclick="setLayer('bgLayer',this.src)">
      <img src="assets/background/bg04.PNG" onclick="setLayer('bgLayer',this.src)">
      <img src="assets/background/bg05.PNG" onclick="setLayer('bgLayer',this.src)">
      <img src="assets/background/bg06.PNG" onclick="setLayer('bgLayer',this.src)">
      <img src="assets/background/bg07.PNG" onclick="setLayer('bgLayer',this.src)">
      <img src="assets/background/bg08.PNG" onclick="setLayer('bgLayer',this.src)">
    </div>
  </div>

  <button class="small-btn" onclick="randomAvatar()">🎲 隨機</button>
  <button class="big-btn" onclick="downloadAvatar()">生成成功</button>
</div>

<div id="resultScreen">
  <h1>咕咕成功</h1>
  <canvas id="resultCanvas" width="280" height="280"></canvas>
  <button class="big-btn" onclick="downloadFinal()">⬇ 下載圖片</button>
  <button class="small-btn" onclick="back()">↩ 返回修改</button>
</div>

<script>
function startGame(){  
  document.getElementById("transition").classList.add("active");  
  setTimeout(()=>{    
    document.getElementById("startScreen").style.display="none";    
    document.getElementById("mainApp").style.display="block";    
    document.getElementById("transition").classList.remove("active");  
  },800);
}

function openTab(tab,event){  
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));  
  document.getElementById(tab).classList.add("active");  
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));  
  if(event) event.target.classList.add("active");
}

function goHome(){  
  document.getElementById("mainApp").style.display="none";  
  document.getElementById("resultScreen").style.display="none";  
  document.getElementById("startScreen").style.display="flex";
}

function back(){  
  document.getElementById("resultScreen").style.display="none";  
  document.getElementById("mainApp").style.display="block";
}

function setLayer(id, src) {
  const el = document.getElementById(id);
  el.crossOrigin = "anonymous"; 
  el.src = src;
}

function clearLayer(id){ document.getElementById(id).src=""; }

function randomAvatar(){
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  const pool = {    
    bodyLayer:["assets/1XqXK0G.png",""],    
    hairLayer:["assets/1XqXK0G.png",""],    
    eyesLayer:["assets/1XqXK0G.png"],    
    faceLayer:["assets/1XqXK0G.png"],    
    mouthLayer:["assets/1XqXK0G.png",""],    
    accessoryLayer:["assets/1XqXK0G.png",""],    
    floatLayer:["assets/1XqXK0G.png",""],    
    bgLayer:["assets/background/bg01.PNG","assets/background/bg02.PNG","assets/background/bg03.PNG","assets/background/bg04.PNG","assets/background/bg05.PNG","assets/background/bg06.PNG","assets/background/bg07.PNG","assets/background/bg08.PNG"]  
  };

  Object.keys(pool).forEach(id=>{    
    const el = document.getElementById(id);
    if(el) {
      el.crossOrigin = "anonymous";
      el.src = pick(pool[id]);
    }
  });
}

function downloadAvatar(){  
  const canvas = document.getElementById("resultCanvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // 這裡的順序決定了誰在上面
  const layerIds = ["bgLayer", "bodyLayer", "faceLayer", "eyesLayer", "mouthLayer", "hairLayer", "accessoryLayer", "floatLayer"];
  
  layerIds.forEach(id => {
    const img = document.getElementById(id);
    // 檢查圖片是否有 src 且不是空的
    if(img && img.getAttribute('src') !== "" && img.naturalWidth !== 0) {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }
  });

  document.getElementById("mainApp").style.display="none";  
  document.getElementById("resultScreen").style.display="block";
}

function downloadFinal(){
  const canvas = document.getElementById("resultCanvas");
  const image = canvas.toDataURL("image/png");
  const link = document.createElement("a");
  link.href = image;
  link.download = "pigeon_" + Date.now() + ".png";
  link.click();
}
</script>

</body>
</html>
